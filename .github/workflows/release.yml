name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write

    env:
      APP_NAME: NervNotch
      BUILD_NUMBER: ${{ github.run_number }}
      # Secrets as job-level env so they can be used in step `if` conditions
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE || '' }}
      APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="${{ inputs.version }}"
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: swift build -c release

      - name: Package .app bundle
        id: package
        run: |
          BIN_DIR="$(swift build -c release --show-bin-path)"
          APP_PATH="dist/${{ env.APP_NAME }}.app"

          mkdir -p "$APP_PATH/Contents/MacOS" \
                   "$APP_PATH/Contents/Resources"

          cp "$BIN_DIR/${{ env.APP_NAME }}" "$APP_PATH/Contents/MacOS/"

          ICON="Sources/NervNotchProApp/Resources/nerv-island-icon.png"
          if [[ -f "$ICON" ]]; then
            cp "$ICON" "$APP_PATH/Contents/Resources/"
          fi

          cat > "$APP_PATH/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>NERV Notch</string>
            <key>CFBundleExecutable</key>
            <string>${{ env.APP_NAME }}</string>
            <key>CFBundleIdentifier</key>
            <string>dev.local.NervNotch</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>NERV Notch</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ steps.meta.outputs.version }}</string>
            <key>CFBundleVersion</key>
            <string>${{ env.BUILD_NUMBER }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          echo "app-path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        id: import-cert
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/signing-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"

          echo "${{ env.MACOS_CERTIFICATE }}" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/notarytool
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          security default-keychain -s "$KEYCHAIN_PATH"

          echo "keychain-path=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"

      - name: Code sign .app bundle
        id: sign
        if: env.MACOS_CERTIFICATE != ''
        env:
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          codesign --force --deep --sign "$SIGNING_IDENTITY" \
            --options runtime \
            --timestamp \
            "${{ steps.package.outputs.app-path }}"

      - name: Create DMG
        id: dmg
        run: |
          APP_PATH="${{ steps.package.outputs.app-path }}"
          DMG_PATH="dist/NervNotch-${{ steps.meta.outputs.version }}.dmg"

          hdiutil create -volname "NERV Notch" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO "$DMG_PATH"

          echo "dmg-path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Notarize DMG
        id: notarize
        if: env.APPLE_NOTARY_KEY != ''
        env:
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER }}
        run: |
          echo "${{ env.APPLE_NOTARY_KEY }}" | base64 --decode -o "$RUNNER_TEMP/AuthKey.p8"

          xcrun notarytool submit "${{ steps.dmg.outputs.dmg-path }}" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER" \
            --wait

          xcrun stapler staple "${{ steps.dmg.outputs.dmg-path }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.meta.outputs.version }}"
          files: ${{ steps.dmg.outputs.dmg-path }}
          generate_release_notes: true
          draft: true
